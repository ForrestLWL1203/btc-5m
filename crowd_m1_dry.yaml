market:
  asset: btc
  timeframe: 5m

strategy:
  type: crowd_m1
  entry_elapsed_sec: 180
  entry_timeout_sec: 5
  min_ask_gap: 0.0
  min_leading_ask: 0.65
  max_entry_price: 0.76
  btc_direction_confirm: true
  # Treat open-to-entry BTC moves smaller than this as no clear direction.
  # Unit is percent: 0.015 means 0.015%, not 1.5%.
  btc_direction_deadband_pct: 0.015
  btc_price_feed_source: binance

params:
  amount: 1.0
  entry_ask_level: 10
  max_slippage_from_best_ask: 0.04
  max_entries_per_window: 1
  stop_loss:
    enabled: true
    # Trigger when held bid falls 35% below actual entry price.
    trigger_drop_pct: 0.35
    start_remaining_sec: 60
    end_remaining_sec: 45
    sell_bid_level: 10
    retry_count: 3
    min_sell_price: 0.20

risk:
  consecutive_loss_amount: 3.0
  daily_loss_amount: 5.0
  consecutive_loss_pause_windows: 2
  daily_loss_pause_windows: 5
