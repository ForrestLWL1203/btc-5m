# Latency Arbitrage Strategy Configuration (experimental probe)
# Goal: allow slightly older BTC data and shorter persistence to increase trigger rate

market:
  asset: btc
  timeframe: 5m

rounds: 1

strategy:
  type: latency_arb
  coefficients:
    ret_2s: 0.985070
    ret_5s: -0.163321
    velocity: 0.001246
    abs_vel: 0.002184
  edge_threshold: 0.02
  noise_threshold: 0.005
  max_data_age_ms: 1000
  min_entry_price: 0.25
  max_entry_price: 0.70
  entry_window_sec: 240
  edge_exit_fraction: 0.3
  max_hold_sec: 2.0
  edge_decay_grace_ms: 300
  persistence_ms: 120
  cooldown_sec: 1.0
  min_reentry_gap_sec: 3.0
  edge_rearm_threshold: 0.01
  phase_one_sec: 90
  max_entries_phase_one: 2
  phase_two_sec: 180
  max_entries_phase_two: 3
  disable_after_sec: 180

params:
  amount: 1.0
  tp_price: 0.80
  sl_pct: 0.05
  max_sl_reentry: 0
  max_tp_reentry: 0
  max_edge_reentry: 3
  max_entries_per_window: 4
